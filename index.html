<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartest Eater</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 1rem 1.5rem;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { font-size: 0.875rem; color: #555; margin-top: 2px; }

    .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; }
    .tab-btn {
      padding: 8px 20px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .tab-btn.active { background: #2e7d32; color: #fff; border-color: #2e7d32; }

    /* ── Controls card ── */
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
    .row:last-child { margin-bottom: 0; }

    label { font-size: 0.8rem; font-weight: 600; color: #444; display: block; margin-bottom: 4px; }

    input[type="text"], textarea {
      width: 100%;
      padding: 9px 12px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus { outline: 2px solid #2e7d32; border-color: transparent; }
    textarea { resize: vertical; min-height: 110px; }

    .field { flex: 1; min-width: 160px; }
    .field-sm { width: 160px; flex: none; }

    .btn {
      padding: 9px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-blue  { background: #1565c0; color: #fff; }
    .btn-blue:hover  { background: #0d47a1; }
    .btn-green { background: #2e7d32; color: #fff; }
    .btn-green:hover { background: #1b5e20; }
    .btn-outline { background: #fff; border: 1px solid #ccc; color: #333; }
    .btn-outline:hover { background: #f5f5f5; }

    #locStatus { font-size: 0.82rem; color: #555; min-height: 1.1em; margin-top: 4px; }

    .hint { font-size: 0.8rem; color: #777; margin-top: 6px; }

    /* ── Ingredient list ── */
    #ingredientList { list-style: none; margin-bottom: 10px; }
    #ingredientList li {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    #ingredientList li input { flex: 1; }
    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #b71c1c;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 6px;
    }
    .remove-btn:hover { color: #d32f2f; }

    /* ── Results ── */
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin: 1.25rem 0 0.75rem;
      color: #1a1a1a;
    }

    /* Best deal banner */
    .best-banner {
      background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
      border: 1px solid #a5d6a7;
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .best-banner h2 { font-size: 1.1rem; margin-bottom: 0.6rem; }
    .best-banner .store-name { font-size: 1rem; font-weight: 700; }
    .meta-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; font-size: 0.875rem; color: #444; }
    .meta-row span b { color: #1a1a1a; }

    /* ── Recipe comparison table ── */
    .table-wrap { overflow-x: auto; margin-bottom: 1.25rem; }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 500px;
      font-size: 0.82rem;
    }
    th {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 7px 10px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }
    th.store-col { background: #e8f5e9; }
    td {
      border: 1px solid #ddd;
      padding: 6px 10px;
      vertical-align: top;
    }
    tr.best-row td { background: #f1f8e9; }
    tr.split-row td { background: #e3f2fd; }
    tr:hover td { background: #fafafa; }
    tr.best-row:hover td { background: #e8f5e9; }
    tr.split-row:hover td { background: #dbeeff; }

    .price-cell { font-weight: 700; color: #2e7d32; white-space: nowrap; }
    .price-cell.best-price { color: #1b5e20; }
    .missing-cell { color: #b71c1c; font-style: italic; font-size: 0.78rem; }
    .total-cell { font-weight: 700; font-size: 0.9rem; }
    .product-name { font-weight: 600; }
    .product-meta { font-size: 0.75rem; color: #777; }

    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      vertical-align: middle;
      margin-left: 4px;
    }
    .badge-best { background: #2e7d32; color: #fff; }
    .badge-split { background: #1565c0; color: #fff; }
    .badge-missing { background: #b71c1c; color: #fff; }

    /* ── Store cards for single-item ── */
    .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .store-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
    }
    .store-card.best { border-color: #a5d6a7; background: #f9fdf9; }
    .store-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
    .store-card p { font-size: 0.85rem; margin: 3px 0; color: #444; }
    .store-card p b { color: #1a1a1a; }

    /* ── Split savings callout ── */
    .split-callout {
      background: #e3f2fd;
      border: 1px solid #90caf9;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    .split-callout strong { font-size: 1rem; }

    .loading { color: #777; font-style: italic; padding: 1rem 0; }
    .error { color: #b71c1c; padding: 1rem 0; }

    /* ── Price History tab ── */
    #historyPanel { display: none; }

    .trend-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 640px) { .trend-grid { grid-template-columns: 1fr; } }

    .bar-chart { width: 100%; }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.82rem;
    }
    .bar-label { width: 36px; text-align: right; color: #555; flex-shrink: 0; }
    .bar-track {
      flex: 1;
      background: #e8f5e9;
      border-radius: 4px;
      height: 20px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: #2e7d32;
      border-radius: 4px;
      transition: width 0.4s ease;
      display: flex;
      align-items: center;
      padding-left: 6px;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .bar-samples { color: #aaa; font-size: 0.75rem; flex-shrink: 0; }

    .sparkline-wrap { overflow-x: auto; }
    .sparkline-table { border-collapse: collapse; width: 100%; min-width: 300px; font-size: 0.8rem; }
    .sparkline-table th { background: #f5f5f5; border: 1px solid #ddd; padding: 5px 8px; }
    .sparkline-table td { border: 1px solid #ddd; padding: 4px 8px; }

    /* ── Store Stats tab ── */
    .stats-champions {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 1.25rem;
    }
    .champion-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .champion-card.gold   { border-color: #f9a825; background: #fffde7; }
    .champion-card.blue   { border-color: #90caf9; background: #e3f2fd; }
    .champion-card.purple { border-color: #ce93d8; background: #f3e5f5; }
    .champion-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 4px; }
    .champion-name  { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
    .champion-stat  { font-size: 0.85rem; color: #555; }

    .stats-table { border-collapse: collapse; width: 100%; font-size: 0.82rem; }
    .stats-table th {
      background: #f5f5f5; border: 1px solid #ddd;
      padding: 7px 10px; text-align: left; font-weight: 600; white-space: nowrap;
    }
    .stats-table th.sortable { cursor: pointer; user-select: none; }
    .stats-table th.sortable:hover { background: #ebebeb; }
    .stats-table td { border: 1px solid #ddd; padding: 6px 10px; vertical-align: middle; }
    .stats-table tr:hover td { background: #fafafa; }
    .stats-table tr.rank-1 td { background: #fffde7; }

    .win-bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
    .win-bar-track { flex: 1; background: #e8f5e9; border-radius: 3px; height: 14px; overflow: hidden; }
    .win-bar-fill  { height: 100%; background: #2e7d32; border-radius: 3px; }
    .win-rate-lbl  { font-size: 0.78rem; font-weight: 700; color: #1a1a1a; white-space: nowrap; width: 38px; text-align: right; }

    .consistency-fill { background: #1565c0; }
    .gap-good { color: #2e7d32; font-weight: 700; }
    .gap-bad  { color: #b71c1c; }
  </style>
</head>
<body>

<header>
  <h1>🛒 Smartest Eater</h1>
  <p>Find the cheapest groceries at the nearest Kroger-family stores.</p>
</header>

<div class="container">

  <!-- ── Mode tabs ── -->
  <div class="tabs">
    <button class="tab-btn active" onclick="setMode('item')">Single Item</button>
    <button class="tab-btn" onclick="setMode('recipe')">Recipe / Shopping List</button>
    <button class="tab-btn" onclick="setMode('history')">📈 Price History</button>
    <button class="tab-btn" onclick="setMode('stats')">🏆 Store Stats</button>
  </div>

  <!-- ── Controls ── -->
  <div class="card">
    <!-- Location row (shared) -->
    <div class="row">
      <div class="field">
        <label for="location">Your location</label>
        <input type="text" id="location" placeholder="Address or ZIP code" value="85001">
      </div>
      <button class="btn btn-blue" onclick="useMyLocation()">📍 Use My Location</button>
    </div>
    <div id="locStatus"></div>

    <!-- Single-item controls -->
    <div id="itemControls" class="row" style="margin-top:10px;">
      <div class="field">
        <label for="item">Item to search</label>
        <input type="text" id="item" placeholder="e.g. milk, eggs, bread" value="milk">
      </div>
      <button class="btn btn-green" onclick="searchItem()">Compare Stores</button>
    </div>

    <!-- Recipe controls -->
    <div id="recipeControls" style="display:none; margin-top:10px;">
      <label>Ingredients <span style="font-weight:400;color:#777">(one per line, or comma-separated)</span></label>
      <textarea id="recipeText" placeholder="milk&#10;eggs&#10;all-purpose flour&#10;unsalted butter&#10;sugar"></textarea>
      <div class="hint">💡 Use ingredient names as you'd search a grocery store (e.g. "all-purpose flour" not "2 cups flour").</div>
      <div class="row" style="margin-top:10px; justify-content:flex-end;">
        <button class="btn btn-outline" onclick="clearRecipe()">Clear</button>
        <button class="btn btn-green" onclick="searchRecipe()">Find Best Store</button>
      </div>
    </div>
  </div>

  <!-- ── Per-tab result panels (each preserved independently) ── -->
  <div id="itemPanel"><div id="itemResults"></div></div>
  <div id="recipePanel" style="display:none"><div id="recipeResults"></div></div>

  <!-- ── Store Stats panel ── -->
  <div id="statsPanel" style="display:none">
    <div id="statsResults"></div>
  </div>

  <!-- ── Price History panel ── -->
  <div id="historyPanel">
    <div class="card">
      <div class="row">
        <div class="field">
          <label for="historyItem">Item</label>
          <input type="text" id="historyItem" placeholder="e.g. milk" list="historyItemList">
          <datalist id="historyItemList"></datalist>
        </div>
        <div class="field-sm">
          <label for="historyDays">Days back</label>
          <input type="text" id="historyDays" value="30" style="width:100%">
        </div>
        <button class="btn btn-green" onclick="loadHistory()">View History</button>
      </div>
    </div>
    <div id="historyResults"></div>
  </div>

</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let geoCoords = null;
  let currentMode = "item";

  // ── Mode switching ─────────────────────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode;
    const btns = document.querySelectorAll(".tab-btn");
    btns[0].classList.toggle("active", mode === "item");
    btns[1].classList.toggle("active", mode === "recipe");
    btns[2].classList.toggle("active", mode === "history");
    btns[3].classList.toggle("active", mode === "stats");

    const hideControls = mode === "history" || mode === "stats";
    document.getElementById("itemControls").style.display   = mode === "item"   ? "" : "none";
    document.getElementById("recipeControls").style.display = mode === "recipe" ? "" : "none";
    document.querySelector(".card").style.display           = hideControls ? "none" : "";
    document.getElementById("itemPanel").style.display      = mode === "item"    ? "" : "none";
    document.getElementById("recipePanel").style.display    = mode === "recipe"  ? "" : "none";
    document.getElementById("historyPanel").style.display   = mode === "history" ? "block" : "none";
    document.getElementById("statsPanel").style.display     = mode === "stats"   ? "block" : "none";

    if (mode === "history") populateHistoryItems();
    if (mode === "stats")   loadStoreStats();
  }

  // ── History: populate datalist ─────────────────────────────────────────────
  async function populateHistoryItems() {
    const out = document.getElementById("historyResults");
    try {
      const items = await fetch("http://localhost:3000/history-items").then(r => r.json());
      const dl = document.getElementById("historyItemList");
      dl.innerHTML = items.map(i => `<option value="${escHtml(i.query)}">`).join("");

      if (!items.length) {
        out.innerHTML = `<div class="card" style="color:#555;font-size:0.9rem;line-height:1.6">
          <b>No price data yet.</b><br>
          Run a search on the <b>Single Item</b> or <b>Recipe</b> tab first —
          every result is automatically saved here. Come back after a few searches
          to see price trends and day-of-week patterns.
        </div>`;
        return;
      }

      const inputEl = document.getElementById("historyItem");
      if (!inputEl.value) {
        inputEl.value = items[0].query;
      }
      // Auto-load history for the pre-filled item if results are not already shown
      if (!out.innerHTML.trim()) loadHistory();
    } catch (err) {
      out.innerHTML = `<p class="error">Could not connect to server: ${escHtml(err.message)}. Is the server running?</p>`;
    }
  }

  // ── History: load & render ─────────────────────────────────────────────────
  async function loadHistory() {
    const item = document.getElementById("historyItem").value.trim();
    const days = parseInt(document.getElementById("historyDays").value, 10) || 30;
    if (!item) return;

    const out = document.getElementById("historyResults");
    out.innerHTML = '<p class="loading">Loading price history…</p>';

    try {
      const [histData, trendData] = await Promise.all([
        fetch(`http://localhost:3000/history?item=${encodeURIComponent(item)}&days=${days}`).then(r => r.json()),
        fetch(`http://localhost:3000/trends?item=${encodeURIComponent(item)}`).then(r => r.json()),
      ]);

      if (!histData.records?.length) {
        out.innerHTML = `<p class="error">No price history for "<b>${escHtml(item)}</b>" yet. Run a search first to start collecting data.</p>`;
        return;
      }

      let html = `<p class="section-title">Price History — "${escHtml(item)}" (last ${days} days, ${histData.records.length} records)</p>`;

      // ── Trend panels side by side ──
      html += `<div class="trend-grid">`;

      // Day-of-week bar chart
      if (trendData.byDayOfWeek?.length) {
        const maxAvg = Math.max(...trendData.byDayOfWeek.map(d => d.avg_price));
        html += `
          <div class="card">
            <div class="section-title" style="margin-top:0">Avg Price by Day of Week</div>
            <div class="bar-chart">
        `;
        trendData.byDayOfWeek.forEach(d => {
          const pct = maxAvg > 0 ? Math.round((d.avg_price / maxAvg) * 100) : 0;
          html += `
            <div class="bar-row">
              <span class="bar-label">${escHtml(d.day_name)}</span>
              <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%">$${d.avg_price.toFixed(2)}</div>
              </div>
              <span class="bar-samples">${d.samples}×</span>
            </div>
          `;
        });
        html += `</div></div>`;
      }

      // By-store breakdown
      if (trendData.byStore?.length) {
        const maxStore = Math.max(...trendData.byStore.map(s => s.avg_price));
        html += `
          <div class="card">
            <div class="section-title" style="margin-top:0">Avg Price by Store</div>
            <div class="bar-chart">
        `;
        trendData.byStore.forEach((s, i) => {
          const pct = maxStore > 0 ? Math.round((s.avg_price / maxStore) * 100) : 0;
          const color = i === 0 ? "#1b5e20" : "#2e7d32";
          html += `
            <div class="bar-row">
              <span class="bar-label" style="width:auto;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(s.store_name)}">${escHtml(s.store_name.replace(/^Kroger\s*/i,""))}</span>
              <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${color}">$${s.avg_price.toFixed(2)}</div>
              </div>
              <span class="bar-samples">${s.samples}×</span>
            </div>
          `;
        });
        html += `</div></div>`;
      }

      html += `</div>`; // end trend-grid

      // Price over time table
      if (trendData.priceOverTime?.length) {
        html += `
          <div class="card">
            <div class="section-title" style="margin-top:0">Price Over Time (daily avg)</div>
            <div class="sparkline-wrap">
              <table class="sparkline-table">
                <thead><tr><th>Date</th><th>Min</th><th>Avg</th><th>Max</th><th>Samples</th></tr></thead>
                <tbody>
        `;
        trendData.priceOverTime.forEach(r => {
          html += `<tr>
            <td>${escHtml(r.date_str)}</td>
            <td class="price-cell">$${r.min_price.toFixed(2)}</td>
            <td class="price-cell">$${r.avg_price.toFixed(2)}</td>
            <td>$${r.max_price.toFixed(2)}</td>
            <td style="color:#999">${r.samples}</td>
          </tr>`;
        });
        html += `</tbody></table></div></div>`;
      }

      // Raw history log
      html += `
        <div class="card">
          <div class="section-title" style="margin-top:0">Raw Log (most recent first)</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Date</th><th>Store</th><th>Product</th><th>Brand</th><th>Size</th><th>Price</th><th>Distance</th></tr></thead>
              <tbody>
      `;
      histData.records.slice(0, 200).forEach(r => {
        html += `<tr>
          <td>${escHtml(r.date_str)}</td>
          <td>${escHtml(r.store_name)}</td>
          <td>${escHtml(r.product || "—")}</td>
          <td>${escHtml(r.brand || "—")}</td>
          <td>${escHtml(r.size || "—")}</td>
          <td class="price-cell">$${Number(r.price).toFixed(2)}</td>
          <td>${r.distance_miles != null ? r.distance_miles + " mi" : "—"}</td>
        </tr>`;
      });
      html += `</tbody></table></div></div>`;

      out.innerHTML = html;
    } catch (err) {
      out.innerHTML = `<p class="error">Error: ${escHtml(err.message)}. Is the server running?</p>`;
    }
  }

  // ── Location ───────────────────────────────────────────────────────────────
  document.getElementById("location").addEventListener("input", () => {
    geoCoords = null;
    setLocStatus("");
  });

  function setLocStatus(msg, color = "#555") {
    const el = document.getElementById("locStatus");
    el.textContent = msg;
    el.style.color = color;
  }

  function useMyLocation() {
    if (!navigator.geolocation) {
      setLocStatus("Geolocation is not supported by this browser.", "red");
      return;
    }
    setLocStatus("Detecting your location…");
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        geoCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        document.getElementById("location").value =
          `${geoCoords.lat.toFixed(5)}, ${geoCoords.lng.toFixed(5)}`;
        setLocStatus("✅ Location detected — click Compare Stores.", "#2e7d32");
      },
      (err) => {
        geoCoords = null;
        setLocStatus(`Could not get location: ${err.message}`, "red");
      }
    );
  }

  function buildOriginParams() {
    if (geoCoords) return `lat=${geoCoords.lat}&lng=${geoCoords.lng}`;
    const loc = document.getElementById("location").value.trim();
    if (/^\d{5}$/.test(loc)) return `zip=${encodeURIComponent(loc)}`;
    return `address=${encodeURIComponent(loc)}`;
  }

  // ── Recipe helpers ─────────────────────────────────────────────────────────
  function parseIngredients() {
    return document.getElementById("recipeText").value
      .split(/[\n,]+/)
      .map(s => s.trim())
      .filter(Boolean);
  }

  function clearRecipe() {
    document.getElementById("recipeText").value = "";
    document.getElementById("recipeResults").innerHTML = "";
  }

  // ── Single item search ─────────────────────────────────────────────────────
  async function searchItem() {
    const item = document.getElementById("item").value.trim();
    if (!item) return;

    const resultsDiv = document.getElementById("itemResults");
    resultsDiv.innerHTML = '<p class="loading">Searching stores…</p>';

    try {
      const qs = `${buildOriginParams()}&item=${encodeURIComponent(item)}`;
      const data = await fetch(`http://localhost:3000/compare?${qs}`).then(r => r.json());

      if (!data.stores?.length) {
        resultsDiv.innerHTML = '<p class="error">No stores or prices found for that item.</p>';
        return;
      }

      const best = data.bestDeal;
      let html = `
        <div class="best-banner">
          <h2>🏆 Best Deal for "${escHtml(item)}"</h2>
          <div class="store-name">${escHtml(best.storeName)} <span class="badge badge-best">Best</span></div>
          <div class="meta-row">
            <span><b>${escHtml(best.product)}</b> — ${escHtml(best.brand || "")} ${escHtml(best.size || "")}</span>
          </div>
          <div class="meta-row">
            <span>💲 <b>$${best.price.toFixed(2)}</b></span>
            <span>📍 <b>${best.distanceMiles ?? "N/A"} mi</b></span>
            <span>🚗 <b>${best.driveMinutes ?? "N/A"} min</b></span>
            <span>📦 ${escHtml(best.stock)}</span>
          </div>
        </div>
        <div class="store-grid">
      `;

      data.stores.forEach((store, i) => {
        html += `
          <div class="store-card ${i === 0 ? "best" : ""}">
            <h3>${escHtml(store.storeName)}${i === 0 ? ' <span class="badge badge-best">Best</span>' : ""}</h3>
            <p><b>Product:</b> ${escHtml(store.product)}</p>
            <p><b>Brand:</b> ${escHtml(store.brand || "—")}</p>
            <p><b>Size:</b> ${escHtml(store.size || "—")}</p>
            <p><b>Price:</b> $${store.price.toFixed(2)}</p>
            <p><b>Distance:</b> ${store.distanceMiles ?? "N/A"} mi · ${store.driveMinutes ?? "N/A"} min</p>
            <p><b>Stock:</b> ${escHtml(store.stock)}</p>
            <p style="color:#999;font-size:0.78rem;margin-top:6px;">Deal score: ${store.dealScore}</p>
          </div>
        `;
      });

      html += "</div>";
      resultsDiv.innerHTML = html;
    } catch (err) {
      resultsDiv.innerHTML = `<p class="error">Error: ${escHtml(err.message)}. Is the server running?</p>`;
    }
  }

  // ── Recipe search ──────────────────────────────────────────────────────────
  async function searchRecipe() {
    const ingredients = parseIngredients();
    if (!ingredients.length) {
      document.getElementById("recipeResults").innerHTML =
        '<p class="error">Please enter at least one ingredient.</p>';
      return;
    }

    const resultsDiv = document.getElementById("recipeResults");
    resultsDiv.innerHTML = `<p class="loading">Checking ${ingredients.length} ingredient(s) across nearby stores… this may take a moment.</p>`;

    try {
      const qs = `${buildOriginParams()}&ingredients=${encodeURIComponent(ingredients.join(","))}`;
      const data = await fetch(`http://localhost:3000/recipe?${qs}`).then(r => r.json());

      if (!data.stores?.length) {
        resultsDiv.innerHTML = '<p class="error">No stores found nearby.</p>';
        return;
      }

      const best = data.stores[0];
      const splitSavings = best.totalPrice > 0
        ? (best.totalPrice - data.splitTotal).toFixed(2)
        : null;

      // ── Best store banner ──
      let html = `
        <div class="best-banner">
          <h2>🏆 Best Store for This Recipe</h2>
          <div class="store-name">${escHtml(best.storeName)} <span class="badge badge-best">Best</span></div>
          <div class="meta-row">
            <span>💲 Total: <b>$${best.totalPrice.toFixed(2)}</b></span>
            <span>📍 <b>${best.distanceMiles ?? "N/A"} mi</b></span>
            <span>🚗 <b>${best.driveMinutes ?? "N/A"} min</b></span>
            ${best.missingCount > 0
              ? `<span style="color:#b71c1c">⚠️ Missing ${best.missingCount} ingredient(s)</span>`
              : '<span style="color:#2e7d32">✅ All ingredients found</span>'}
          </div>
        </div>
      `;

      // ── Split shopping callout (only if meaningful) ──
      if (data.splitTotal > 0 && splitSavings > 0) {
        html += `
          <div class="split-callout">
            <span class="badge badge-split">Split Shopping</span>
            &nbsp;Buying the cheapest of each ingredient across different stores costs
            <strong>$${data.splitTotal.toFixed(2)}</strong> total
            (saves <strong>$${splitSavings}</strong> vs. shopping at one place,
            but requires visiting multiple stores).
            See the <em>Cheapest Split</em> row in the table below.
          </div>
        `;
      }

      // ── Comparison table ──
      html += `
        <p class="section-title">Full Comparison — All Stores × All Ingredients</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="store-col">Store</th>
                <th class="store-col">Distance</th>
      `;

      ingredients.forEach(ing => {
        html += `<th>${escHtml(ing)}</th>`;
      });

      html += `
                <th class="store-col">Total</th>
                <th class="store-col">Missing</th>
              </tr>
            </thead>
            <tbody>
      `;

      data.stores.forEach((store, si) => {
        const rowClass = si === 0 ? "best-row" : "";
        html += `<tr class="${rowClass}">`;
        html += `<td>
          <span class="product-name">${escHtml(store.storeName)}</span>
          ${si === 0 ? '<span class="badge badge-best">Best</span>' : ""}
          <div class="product-meta">${escHtml(store.address)}</div>
        </td>`;
        html += `<td><span class="product-meta">${store.distanceMiles ?? "N/A"} mi · ${store.driveMinutes ?? "N/A"} min</span></td>`;

        store.ingredients.forEach((ing) => {
          if (!ing.found) {
            html += `<td class="missing-cell">Not found</td>`;
          } else {
            // Check if this is the cheapest price for this ingredient
            const isCheapest = data.splitBest.find(
              s => s.ingredient === ing.query && s.cheapest?.storeName === store.storeName
            );
            html += `
              <td>
                <div class="price-cell ${isCheapest ? "best-price" : ""}">
                  $${ing.price.toFixed(2)}${isCheapest ? ' <span class="badge badge-split" title="Cheapest for this ingredient">💲</span>' : ""}
                </div>
                <div class="product-name">${escHtml(ing.product)}</div>
                <div class="product-meta">${escHtml(ing.brand || "")} ${escHtml(ing.size || "")}</div>
              </td>
            `;
          }
        });

        html += `<td class="total-cell price-cell">$${store.totalPrice.toFixed(2)}</td>`;
        html += `<td>${store.missingCount > 0
          ? `<span class="badge badge-missing">${store.missingCount}</span>`
          : "✅"}</td>`;
        html += `</tr>`;
      });

      // ── Split shopping row ──
      html += `<tr class="split-row">`;
      html += `<td colspan="2"><span class="product-name">💲 Cheapest Split</span> <span class="badge badge-split">Best per item</span><div class="product-meta">Cheapest option for each ingredient, any store</div></td>`;

      data.splitBest.forEach(s => {
        if (!s.cheapest) {
          html += `<td class="missing-cell">Not found</td>`;
        } else {
          html += `
            <td>
              <div class="price-cell best-price">$${s.cheapest.price.toFixed(2)}</div>
              <div class="product-name">${escHtml(s.cheapest.storeName)}</div>
              <div class="product-meta">${escHtml(s.cheapest.product)}</div>
            </td>
          `;
        }
      });

      html += `<td class="total-cell price-cell">$${data.splitTotal.toFixed(2)}</td>`;
      html += `<td>—</td></tr>`;

      html += `</tbody></table></div>`;

      resultsDiv.innerHTML = html;
    } catch (err) {
      resultsDiv.innerHTML = `<p class="error">Error: ${escHtml(err.message)}. Is the server running?</p>`;
    }
  }

  // ── Store Stats ────────────────────────────────────────────────────────────
  let statsLoaded = false;

  async function loadStoreStats() {
    const out = document.getElementById("statsResults");
    if (statsLoaded && out.innerHTML.trim()) return; // cached
    out.innerHTML = '<p class="loading">Loading store performance…</p>';
    statsLoaded = false;

    try {
      const data = await fetch("http://localhost:3000/store-stats").then(r => r.json());
      const stores = data.stores || [];

      if (!stores.length) {
        out.innerHTML = `<div class="card" style="color:#555;font-size:0.9rem;line-height:1.6">
          <b>No data yet.</b><br>Run a search on the Single Item or Recipe tab first — every
          result is saved and powers these stats.
        </div>`;
        return;
      }

      // ── Find champions ──
      const champion      = stores[0]; // most wins
      const mostConsistent = [...stores].sort((a,b) => b.consistency_score - a.consistency_score)[0];
      const lowestGap     = [...stores].sort((a,b) => a.avg_price_gap - b.avg_price_gap)[0];

      const maxWins = Math.max(...stores.map(s => s.wins));
      const maxConsistency = Math.max(...stores.map(s => s.consistency_score));

      // ── Champion cards ──
      let html = `<p class="section-title">Store Performance — ${data.totalSessions} unique search sessions</p>`;
      html += `<div class="stats-champions">`;

      html += `
        <div class="champion-card gold">
          <div class="champion-label">🏆 Most Wins</div>
          <div class="champion-name">${escHtml(champion.store_name)}</div>
          <div class="champion-stat">${champion.wins} wins · ${champion.win_rate}% win rate</div>
        </div>
      `;
      html += `
        <div class="champion-card blue">
          <div class="champion-label">🎯 Most Consistent</div>
          <div class="champion-name">${escHtml(mostConsistent.store_name)}</div>
          <div class="champion-stat">${mostConsistent.consistency_score}% within 10% of cheapest</div>
        </div>
      `;
      html += `
        <div class="champion-card purple">
          <div class="champion-label">💲 Smallest Price Gap</div>
          <div class="champion-name">${escHtml(lowestGap.store_name)}</div>
          <div class="champion-stat">avg $${lowestGap.avg_price_gap.toFixed(2)} above cheapest</div>
        </div>
      `;

      html += `</div>`; // end champions

      // ── Full table ──
      html += `
        <div class="card">
          <div class="section-title" style="margin-top:0">All Stores Ranked</div>
          <div class="table-wrap">
            <table class="stats-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Store</th>
                  <th>Sessions</th>
                  <th>Wins</th>
                  <th style="min-width:160px">Win Rate</th>
                  <th>Avg $ Gap</th>
                  <th>Avg % Above Cheapest</th>
                  <th style="min-width:160px">Consistency</th>
                </tr>
              </thead>
              <tbody>
      `;

      stores.forEach((s, i) => {
        const winPct   = maxWins > 0 ? Math.round(s.wins / maxWins * 100) : 0;
        const consPct  = maxConsistency > 0 ? Math.round(s.consistency_score / maxConsistency * 100) : 0;
        const gapClass = s.avg_price_gap === 0 ? "gap-good" : s.avg_price_gap <= 0.10 ? "" : "gap-bad";

        html += `
          <tr class="${i === 0 ? "rank-1" : ""}">
            <td style="color:#999;font-size:0.78rem">${i + 1}</td>
            <td>
              <span style="font-weight:600">${escHtml(s.store_name)}</span>
              ${i === 0 ? '<span class="badge badge-best" style="margin-left:4px">Champion</span>' : ""}
            </td>
            <td style="color:#777">${s.total_sessions}</td>
            <td style="font-weight:700">${s.wins}</td>
            <td>
              <div class="win-bar-wrap">
                <div class="win-bar-track">
                  <div class="win-bar-fill" style="width:${winPct}%"></div>
                </div>
                <span class="win-rate-lbl">${s.win_rate}%</span>
              </div>
            </td>
            <td class="${gapClass}">$${s.avg_price_gap.toFixed(2)}</td>
            <td style="color:#555">${s.avg_pct_above_cheapest.toFixed(1)}%</td>
            <td>
              <div class="win-bar-wrap">
                <div class="win-bar-track">
                  <div class="win-bar-fill consistency-fill" style="width:${consPct}%"></div>
                </div>
                <span class="win-rate-lbl">${s.consistency_score}%</span>
              </div>
            </td>
          </tr>
        `;
      });

      html += `</tbody></table></div>
        <p style="font-size:0.78rem;color:#999;margin-top:8px">
          Win rate = % of search sessions where this store had the lowest price.
          Consistency = % of sessions where price was within 10% of the cheapest option.
        </p>
      </div>`;

      out.innerHTML = html;
      statsLoaded = true;
    } catch (err) {
      out.innerHTML = `<p class="error">Error: ${escHtml(err.message)}. Is the server running?</p>`;
    }
  }

  function escHtml(str) {
    return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
</script>
</body>
</html>
