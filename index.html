<!DOCTYPE html>
<html>
<head>
  <title>Smart Eater</title>
</head>
<body>
  <h1>Smart Eater</h1>

  <input id="zip" placeholder="ZIP Code" value="85001">
  <input id="item" placeholder="Food item" value="milk">
  <button onclick="search()">Compare Stores</button>

  <div id="summary"></div>
  <div id="results"></div>

  <script>
    async function search() {
      const zip = document.getElementById("zip").value;
      const item = document.getElementById("item").value;

      const res = await fetch(`https://smart-eater.onrender.com/compare?zip=${zip}&item=${item}`);
      const data = await res.json();

      const summaryDiv = document.getElementById("summary");
      const resultsDiv = document.getElementById("results");

      summaryDiv.innerHTML = "";
      resultsDiv.innerHTML = "";

      if (!data.stores || data.stores.length === 0) {
        summaryDiv.innerHTML = "<h2>No store prices found.</h2>";
        return;
      }

      const best = data.bestDeal;

      summaryDiv.innerHTML = `
        <h2>Best Deal</h2>
        <p><b>Store:</b> ${best.storeName}</p>
        <p><b>Product:</b> ${best.product}</p>
        <p><b>Price:</b> $${best.price.toFixed(2)}</p>
        <p><b>Distance:</b> ${best.distanceMiles ?? "N/A"} miles</p>
        <p><b>Drive time:</b> ${best.driveMinutes ?? "N/A"} minutes</p>
        <p><b>Why:</b> Best balance of price + distance.</p>
      `;

      data.stores.forEach(store => {
        const div = document.createElement("div");
        div.style.border = "1px solid black";
        div.style.margin = "10px";
        div.style.padding = "10px";

        div.innerHTML = `
          <h3>${store.storeName}</h3>
          <p><b>Address:</b> ${store.address}</p>
          <p><b>Product:</b> ${store.product}</p>
          <p><b>Brand:</b> ${store.brand}</p>
          <p><b>Size:</b> ${store.size}</p>
          <p><b>Price:</b> $${store.price.toFixed(2)}</p>
          <p><b>Distance:</b> ${store.distanceMiles ?? "N/A"} miles</p>
          <p><b>Drive time:</b> ${store.driveMinutes ?? "N/A"} minutes</p>
          <p><b>Stock:</b> ${store.stock}</p>
          <p><b>Deal score:</b> ${store.dealScore}</p>
        `;

        resultsDiv.appendChild(div);
      });
    }
  </script>
</body>
</html>
